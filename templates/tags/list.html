{% extends "base.html" %}

{% block header %}
<h1 = class="title">{{ page.title }}</h1>
{% endblock header %}
{% block content %}
{% if terms | length > 0 %}
<p>
{% for term in terms %}
<a href="{{ term.permalink | safe }}">#{{ term.name }}</a>[{{ term.pages | length }}]
{% endfor %}
</p>
{% endif %}
{% endblock content %}
